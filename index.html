<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHUB ISSUE Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- tailwind + daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- js -->
    <script src="./script/login.js" defer></script>
</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto font-[Roboto]">

    <!-- logo -->
    <div class="logo w-[200px] mx-auto pt-24">
        <img src="./assets/github-logo.png" alt="logo" class="w-28 mx-auto">
    </div>
    <div class="text-center mt-4">
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
        <p class="text-sm text-gray-500">Sign in to manage your issues</p>
    </div>

    <div class="text-center pt-6">

        <div class="card bg-base-200 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-3xl">
            <div class="card-body">

                <fieldset class="fieldset">

                    <label class="label text-neutral font-bold">Username</label>
                    <input 
                        id="input-number"
                        type="text"
                        class="input rounded-full bg-base-200"
                        placeholder="Enter Username"
                    />

    
                    <label class="label text-neutral font-bold mt-2">Password</label>
                    <input 
                        id="input-pass"
                        type="password"
                        class="input rounded-full bg-base-200"
                        placeholder="Enter Password"
                    />


            
                    <button id="login-btn" class="btn btn-primary mt-4 rounded-full">
                        Sign In
                    </button>

              
                    <div class="divider text-sm">OR</div>

                 
                    <div class="bg-base-300 p-4 rounded-xl text-sm">
                        <p class="font-semibold text-center mb-1">Demo Credentials:</p>
                        <p class="text-center">Username: admin</p>
                        <p class="text-center">Password: admin123</p>
                    </div>

                </fieldset>

            </div>
        </div>

    </div>

</body>
</html>
